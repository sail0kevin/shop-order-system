<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理后台 — LUXEMALL</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#2563eb;--primary-light:#dbeafe;--primary-dark:#1d4ed8;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;--radius:16px;--radius-sm:10px;--shadow:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.06);--shadow-hover:0 10px 30px rgba(0,0,0,.06),0 4px 8px rgba(0,0,0,.04);--sidebar-w:250px}
    html{font-size:14px}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-800);display:flex;min-height:100vh}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:2px}

    .sidebar{width:var(--sidebar-w);background:#fff;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:50;transition:transform .25s ease}
    .sidebar-logo{padding:22px 24px;font-size:1.25rem;font-weight:700;letter-spacing:-.02em;color:var(--gray-900);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--gray-100)}
    .sidebar-logo i{color:var(--primary);font-size:1.4rem}
    .sidebar-nav{padding:12px;flex:1;display:flex;flex-direction:column;gap:2px}
    .sidebar-nav a{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);font-size:.9rem;font-weight:500;color:var(--gray-500);transition:all .15s ease;cursor:pointer;text-decoration:none}
    .sidebar-nav a i{width:18px;text-align:center;font-size:1rem}
    .sidebar-nav a:hover{background:var(--gray-100);color:var(--gray-700)}
    .sidebar-nav a.active{background:var(--primary-light);color:var(--primary);font-weight:600}
    .sidebar-nav .nav-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--gray-400);padding:16px 14px 6px}

    .main{margin-left:var(--sidebar-w);flex:1;padding:0 32px 40px;min-height:100vh}
    .header{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--gray-100);margin-bottom:28px}
    .header h1{font-size:1.35rem;font-weight:700;color:var(--gray-900)}
    .header-right{display:flex;align-items:center;gap:18px}
    .icon-btn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gray-500);background:var(--gray-100);transition:all .15s ease;cursor:pointer;border:none;font-size:.95rem}
    .icon-btn:hover{background:var(--gray-200);color:var(--gray-700)}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700}
    .user-name{font-size:.85rem;font-weight:500;color:var(--gray-700)}

    .tab-content{display:none}
    .tab-content.active{display:block}

    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
    .stat-card{background:#fff;border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow);transition:box-shadow .2s ease,transform .2s ease}
    .stat-card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
    .stat-top{display:flex;justify-content:space-between;align-items:flex-start}
    .stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#fff}
    .stat-icon.blue{background:linear-gradient(135deg,#2563eb,#3b82f6)}
    .stat-icon.green{background:linear-gradient(135deg,#059669,#10b981)}
    .stat-icon.orange{background:linear-gradient(135deg,#d97706,#f59e0b)}
    .stat-icon.purple{background:linear-gradient(135deg,#7c3aed,#a855f7)}
    .stat-number{font-size:1.75rem;font-weight:800;color:var(--gray-900);margin-top:14px;line-height:1.1}
    .stat-label{font-size:.82rem;color:var(--gray-500);margin-top:4px}

    .row-cards{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:24px}
    .card-panel{background:#fff;border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow)}
    .card-panel h3{font-size:.95rem;font-weight:700;color:var(--gray-800);margin-bottom:16px}
    .chart-wrap{position:relative;height:240px}

    .todo-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray-100)}
    .todo-item:last-child{border-bottom:none}
    .todo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .todo-dot.blue{background:var(--primary)}
    .todo-dot.green{background:#10b981}
    .todo-dot.orange{background:#f59e0b}
    .todo-text{flex:1;font-size:.85rem;font-weight:500;color:var(--gray-700)}
    .todo-time{font-size:.75rem;color:var(--gray-400);white-space:nowrap}

    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    thead{background:var(--gray-50)}
    th{text-align:left;padding:12px 16px;font-weight:600;color:var(--gray-500);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--gray-200)}
    td{padding:14px 16px;border-bottom:1px solid var(--gray-100);color:var(--gray-700)}
    tbody tr:hover{background:var(--gray-50)}
    .badge{display:inline-flex;align-items:center;gap:5px;font-size:.78rem;font-weight:500;padding:3px 12px;border-radius:20px}
    .badge.paid{background:#d1fae5;color:#059669}
    .badge.pending{background:#fef3c7;color:#d97706}
    .badge.shipped{background:#dbeafe;color:#2563eb}
    .badge.done{background:var(--gray-100);color:var(--gray-500)}
    .badge.cancel{background:#fee2e2;color:#dc2626}
    .badge i{font-size:.5rem}

    .pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px}
    .pagination button{padding:8px 14px;border:1px solid var(--gray-200);background:#fff;border-radius:8px;font-size:.82rem;cursor:pointer;color:var(--gray-600);transition:all .15s}
    .pagination button:hover:not(:disabled){border-color:var(--primary);color:var(--primary)}
    .pagination button:disabled{opacity:.4;cursor:default}
    .pagination span{font-size:.82rem;color:var(--gray-500)}

    .toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center}
    .toolbar input{padding:8px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.85rem;outline:none;width:220px}
    .toolbar input:focus{border-color:var(--primary)}
    .toolbar select{padding:8px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.85rem;outline:none;background:#fff}
    .btn-sm{padding:8px 16px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-weight:500;transition:background .15s}
    .btn-sm:hover{background:var(--primary-dark)}
    .btn-sm.outline{background:#fff;color:var(--primary);border:1px solid var(--primary)}
    .btn-sm.outline:hover{background:var(--primary-light)}
    .btn-sm.danger{background:#fff;color:#dc2626;border:1px solid #fee2e2}
    .btn-sm.danger:hover{background:#fee2e2}

    .empty-state{text-align:center;padding:60px 20px;color:var(--gray-400)}
    .empty-state i{font-size:3rem;display:block;margin-bottom:12px}
    .empty-state p{font-size:.9rem}

    .login-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center}
    .login-overlay.show{display:flex}
    .login-box{background:#fff;border-radius:var(--radius);padding:36px 32px;width:380px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15)}
    .login-box h2{font-size:1.2rem;font-weight:700;margin-bottom:20px;text-align:center}
    .login-box input{width:100%;padding:12px 14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);font-size:.9rem;margin-bottom:12px;outline:none;transition:border .2s}
    .login-box input:focus{border-color:var(--primary)}
    .login-box .btn-login{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;cursor:pointer;transition:background .2s}
    .login-box .btn-login:hover{background:var(--primary-dark)}
    .login-error{color:#dc2626;font-size:.8rem;text-align:center;margin-top:8px;display:none}
    .loading-text{text-align:center;color:var(--gray-400);padding:40px;font-size:.9rem}

    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40}

    @media(max-width:1024px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:768px){
      .sidebar{transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .main{margin-left:0;padding:0 18px 32px}
      .stat-grid{grid-template-columns:1fr 1fr;gap:12px}
      .row-cards{grid-template-columns:1fr;gap:16px}
    }
    @media(max-width:480px){.stat-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2><i class="fa-solid fa-lock"></i> 管理员登录</h2>
    <input id="adminUser" placeholder="用户名" value="admin" />
    <input id="adminPass" type="password" placeholder="密码" value="123456" />
    <button class="btn-login" onclick="doLogin()">登 录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><i class="fa-solid fa-store"></i> LUXEMALL</div>
  <nav class="sidebar-nav">
    <div class="nav-label">概览</div>
    <a class="active" data-tab="dashboard"><i class="fa-solid fa-chart-pie"></i> 仪表盘</a>
    <div class="nav-label">管理</div>
    <a data-tab="users"><i class="fa-solid fa-users"></i> 用户管理</a>
    <a data-tab="products"><i class="fa-solid fa-box"></i> 商品管理</a>
    <a data-tab="orders"><i class="fa-solid fa-file-invoice"></i> 订单列表</a>
    <div class="nav-label">系统</div>
    <a data-tab="settings"><i class="fa-solid fa-gear"></i> 设置</a>
  </nav>
  <div style="padding:12px;border-top:1px solid var(--gray-100);font-size:.82rem;color:var(--gray-400);text-align:center">v1.0.0</div>
</aside>

<div class="main">
  <header class="header">
    <div style="display:flex;align-items:center;gap:14px">
      <button class="icon-btn" id="menuBtn" style="display:none" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <h1 id="pageTitle">仪表盘</h1>
    </div>
    <div class="header-right">
      <span class="user-name" id="adminName"></span>
      <div class="avatar" id="adminAvatar">A</div>
      <button class="icon-btn" onclick="doLogout()" title="退出"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </header>

  <!-- ====== 仪表盘 ====== -->
  <div class="tab-content active" id="tab-dashboard">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-top"><div class="stat-icon blue"><i class="fa-solid fa-dollar-sign"></i></div></div><div class="stat-number" id="sSales">¥0</div><div class="stat-label">总销售额</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon green"><i class="fa-solid fa-cart-shopping"></i></div></div><div class="stat-number" id="sOrders">0</div><div class="stat-label">总订单数</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon orange"><i class="fa-solid fa-box"></i></div></div><div class="stat-number" id="sProducts">0</div><div class="stat-label">商品数量</div></div>
      <div class="stat-card"><div class="stat-top"><div class="stat-icon purple"><i class="fa-solid fa-user-group"></i></div></div><div class="stat-number" id="sUsers">0</div><div class="stat-label">注册用户数</div></div>
    </div>
    <div class="row-cards">
      <div class="card-panel"><h3>近 7 日收入趋势</h3><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
      <div class="card-panel"><h3>待办事项</h3><div id="todoList"></div></div>
    </div>
    <div class="card-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3>最新订单</h3></div>
      <div class="table-wrap"><table><thead><tr><th>订单编号</th><th>用户ID</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody id="dashOrders"></tbody></table></div>
    </div>
  </div>

  <!-- ====== 用户管理 ====== -->
  <div class="tab-content" id="tab-users">
    <div class="card-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3>用户列表</h3><span style="font-size:.8rem;color:var(--gray-400)">共 <b id="userTotal">0</b> 条</span></div>
      <div class="table-wrap"><table><thead><tr><th>ID</th><th>用户名</th><th>昵称</th><th>手机号</th><th>邮箱</th><th>注册时间</th></tr></thead><tbody id="userTable"></tbody></table></div>
      <div class="pagination" id="userPager"></div>
    </div>
  </div>

  <!-- ====== 商品管理 ====== -->
  <div class="tab-content" id="tab-products">
    <div class="card-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3>商品列表</h3>
        <div class="toolbar" style="margin-bottom:0">
          <input id="prodSearch" placeholder="搜索商品..." onkeyup="if(event.key==='Enter')loadProducts(1)" />
          <select id="prodCat" onchange="loadProducts(1)"><option value="">全部分类</option></select>
          <button class="btn-sm" onclick="loadProducts(1)"><i class="fa-solid fa-search"></i> 搜索</button>
        </div>
      </div>
      <div class="table-wrap"><table><thead><tr><th>ID</th><th>名称</th><th>分类</th><th>价格</th><th>库存</th><th>状态</th></tr></thead><tbody id="prodTable"></tbody></table></div>
      <div class="pagination" id="prodPager"></div>
    </div>
  </div>

  <!-- ====== 订单列表 ====== -->
  <div class="tab-content" id="tab-orders">
    <div class="card-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3>全部订单</h3><span style="font-size:.8rem;color:var(--gray-400)">共 <b id="orderTotal">0</b> 条</span></div>
      <div class="table-wrap"><table><thead><tr><th>订单编号</th><th>用户ID</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody id="orderTable"></tbody></table></div>
      <div class="pagination" id="orderPager"></div>
    </div>
  </div>

  <!-- ====== 设置 ====== -->
  <div class="tab-content" id="tab-settings">
    <div class="card-panel">
      <h3>系统设置</h3>
      <div class="empty-state"><i class="fa-solid fa-gear"></i><p>系统设置页面开发中...</p></div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('token');
let chartInstance = null;
const statusMap = {0:{text:'待支付',cls:'pending'},1:{text:'已支付',cls:'paid'},2:{text:'已发货',cls:'shipped'},3:{text:'已完成',cls:'done'}};

async function api(url, opts={}){
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(API + url, {...opts, headers});
  if(res.status === 401){ token=''; localStorage.removeItem('token'); showLogin(); throw new Error('请先登录'); }
  const json = await res.json();
  if(json.code !== 200) throw new Error(json.message || '请求失败');
  return json.data;
}

/* ===== 登录 ===== */
function showLogin(){ document.getElementById('loginOverlay').classList.add('show'); }
function hideLogin(){ document.getElementById('loginOverlay').classList.remove('show'); }

async function doLogin(){
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value.trim();
  if(!u||!p) return;
  try{
    const res = await fetch(API+'/user/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const json = await res.json();
    if(json.code !== 200){ document.getElementById('loginError').textContent = json.message||'登录失败'; document.getElementById('loginError').style.display='block'; return; }
    token = json.data.token;
    localStorage.setItem('token', token);
    document.getElementById('loginError').style.display='none';
    hideLogin();
    initAdmin();
  }catch(e){ document.getElementById('loginError').textContent='网络错误'; document.getElementById('loginError').style.display='block'; }
}

function doLogout(){ token=''; localStorage.removeItem('token'); showLogin(); }

/* ===== 侧栏 ===== */
const titles = {dashboard:'仪表盘',users:'用户管理',products:'商品管理',orders:'订单列表',settings:'系统设置'};
document.querySelectorAll('.sidebar-nav a[data-tab]').forEach(a => {
  a.addEventListener('click', function(){
    document.querySelectorAll('.sidebar-nav a').forEach(x => x.classList.remove('active'));
    this.classList.add('active');
    const tab = this.dataset.tab;
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-'+tab).classList.add('active');
    document.getElementById('pageTitle').textContent = titles[tab]||'';
    if(tab==='dashboard') loadDashboard();
    if(tab==='users') loadUsers(1);
    if(tab==='products') loadProducts(1);
    if(tab==='orders') loadOrders(1);
    closeSidebar();
  });
});

function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

/* ===== 仪表盘 ===== */
async function loadDashboard(){
  try{
    const [stats, chartData, orderPage] = await Promise.all([
      api('/admin/stats'), api('/admin/chart'), api('/admin/orders?page=1&size=8')
    ]);
    document.getElementById('sSales').textContent = '¥'+Number(stats.totalSales||0).toLocaleString();
    document.getElementById('sOrders').textContent = Number(stats.orderCount||0).toLocaleString();
    document.getElementById('sProducts').textContent = Number(stats.productCount||0).toLocaleString();
    document.getElementById('sUsers').textContent = Number(stats.userCount||0).toLocaleString();
    renderChart(chartData||[]);
    renderDashOrders(orderPage?.records||[]);
  }catch(e){ console.error(e); }
}

function renderChart(data){
  const ctx = document.getElementById('chart').getContext('2d');
  if(chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type:'line',
    data:{labels:data.map(d=>d.date),datasets:[{label:'收入 (¥)',data:data.map(d=>Number(d.amount||0)),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#2563eb',pointHoverBorderColor:'#fff',pointHoverBorderWidth:2,borderWidth:2.5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},y:{grid:{color:'#f1f5f9',drawBorder:false},ticks:{color:'#94a3b8',font:{size:11},callback:v=>'¥'+v.toLocaleString()}}},interaction:{intersect:false,mode:'index'}}
  });
}

function renderDashOrders(orders){
  const tbody = document.getElementById('dashOrders');
  if(!orders.length){ tbody.innerHTML='<tr><td colspan="5" class="loading-text">暂无订单</td></tr>'; return; }
  tbody.innerHTML = orders.map(o => {
    const s = statusMap[o.status]||{text:'未知',cls:'pending'};
    const t = o.createTime ? new Date(o.createTime).toLocaleDateString('zh-CN') : '—';
    return `<tr><td style="font-family:monospace;font-weight:500">${o.orderNo}</td><td>${o.userId}</td><td style="font-weight:700">¥${Number(o.totalAmount||0).toLocaleString()}</td><td><span class="badge ${s.cls}"><i class="fa-solid fa-circle"></i>${s.text}</span></td><td style="color:var(--gray-400)">${t}</td></tr>`;
  }).join('');
}

/* ===== 用户管理 ===== */
async function loadUsers(page){
  try{
    const data = await api(`/admin/users?page=${page}&size=10`);
    document.getElementById('userTotal').textContent = data.total||0;
    document.getElementById('userTable').innerHTML = (data.records||[]).map(u => {
      const t = u.createTime ? new Date(u.createTime).toLocaleDateString('zh-CN') : '—';
      return `<tr><td>${u.id}</td><td style="font-weight:600">${u.username}</td><td>${u.nickname||'—'}</td><td>${u.phone||'—'}</td><td>${u.email||'—'}</td><td style="color:var(--gray-400)">${t}</td></tr>`;
    }).join('');
    renderPager('userPager', data, loadUsers);
  }catch(e){ console.error(e); }
}

/* ===== 商品管理 ===== */
async function loadProducts(page){
  try{
    const kw = document.getElementById('prodSearch')?.value||'';
    const cat = document.getElementById('prodCat')?.value||'';
    const data = await api(`/product/list?page=${page}&size=10&keyword=${encodeURIComponent(kw)}&category=${encodeURIComponent(cat)}`);
    // populate category dropdown
    const cats = [...new Set((data.records||[]).map(p=>p.category).filter(Boolean))];
    const sel = document.getElementById('prodCat');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全部分类</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    sel.value = cur;
    document.getElementById('prodTable').innerHTML = (data.records||[]).map(p =>
      `<tr><td>${p.id}</td><td style="font-weight:600">${p.name}</td><td>${p.category||'—'}</td><td style="font-weight:700">¥${Number(p.price||0).toLocaleString()}</td><td>${p.stock??'—'}</td><td><span class="badge paid">上架</span></td></tr>`
    ).join('');
    renderPager('prodPager', data, loadProducts);
  }catch(e){ console.error(e); }
}

/* ===== 订单管理 ===== */
async function loadOrders(page){
  try{
    const data = await api(`/admin/orders?page=${page}&size=10`);
    document.getElementById('orderTotal').textContent = data.total||0;
    document.getElementById('orderTable').innerHTML = (data.records||[]).map(o => {
      const s = statusMap[o.status]||{text:'未知',cls:'pending'};
      const t = o.createTime ? new Date(o.createTime).toLocaleString('zh-CN') : '—';
      return `<tr><td style="font-family:monospace;font-weight:500">${o.orderNo}</td><td>${o.userId}</td><td style="font-weight:700">¥${Number(o.totalAmount||0).toLocaleString()}</td><td><span class="badge ${s.cls}"><i class="fa-solid fa-circle"></i>${s.text}</span></td><td style="color:var(--gray-400)">${t}</td></tr>`;
    }).join('');
    renderPager('orderPager', data, loadOrders);
  }catch(e){ console.error(e); }
}

function renderPager(id, data, fn){
  const el = document.getElementById(id);
  if(!data||data.pages<=1){ el.innerHTML=''; return; }
  let h = `<button ${data.current<=1?'disabled':''} onclick="${fn.name}(${data.current-1})"><i class="fa-solid fa-chevron-left"></i></button>`;
  h += `<span>${data.current} / ${data.pages}</span>`;
  h += `<button ${data.current>=data.pages?'disabled':''} onclick="${fn.name}(${data.current+1})"><i class="fa-solid fa-chevron-right"></i></button>`;
  el.innerHTML = h;
}
